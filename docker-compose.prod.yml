services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opc}
      POSTGRES_DB: ${POSTGRES_DB:-opc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: ${MOSQUITTO_IMAGE:-ghcr.io/logact/opc-mosquitto:latest}
    restart: unless-stopped
    ports:
      - '${MQTT_PORT:-1883}:1883'
    volumes:
      - mosquitto_data:/mosquitto/data
      - ./docker/mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
    depends_on:
      server:
        condition: service_healthy

  migrations:
    image: ${SERVER_IMAGE}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-opc}:${POSTGRES_PASSWORD:-opc}@postgres:5432/${POSTGRES_DB:-opc}}
    command: ['node', 'packages/database/dist/migrate-cli.js']
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrations

  server:
    image: ${SERVER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-opc}:${POSTGRES_PASSWORD:-opc}@postgres:5432/${POSTGRES_DB:-opc}}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
      MQTT_SERVER_USERNAME: ${MQTT_SERVER_USERNAME:-__server__}
      MQTT_SERVER_PASSWORD: ${MQTT_SERVER_PASSWORD}
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'node -e "fetch(\"http://localhost:$${PORT}/api/v1/rooms\").then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  mosquitto_data:
