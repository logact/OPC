# Subflow: ensure the user is logged in.
# If the login screen is visible, register a participant and continue.
appId: com.logact.utralTodo
env:
  MAESTRO_USER_ID: maestro-e2e
  MAESTRO_USER_NAME: Maestro E2E
---
# Wait until the app is interactive: login screen (fresh state) or Chats tab
# (already logged in). A bare `visible` check races the JS bundle load and
# would wrongly skip login on a cold start (first bundle on CI can take >1 min).
- extendedWaitUntil:
    visible:
      id: "login-id-input|tab-chats"
    timeout: 120000
- runFlow:
    when:
      visible:
        id: login-id-input
    commands:
      - tapOn:
          id: login-id-input
      - inputText: ${MAESTRO_USER_ID}
      - tapOn:
          id: login-name-input
      - inputText: ${MAESTRO_USER_NAME}
      # iOS 26 simulators don't expose the keyboard to XCUITest, so
      # hideKeyboard fails; single-line inputs blur on submit (Enter) instead.
      - pressKey: enter
      - tapOn:
          id: login-submit
      # after login we must land on the Chats tab; allow for slow first
      # bundle loads / network registration on CI emulators
      - extendedWaitUntil:
          visible:
            id: tab-chats
          timeout: 90000
