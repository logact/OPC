# F1 — Login: fresh app shows login, successful register lands on Chats tab.
appId: com.logact.utralTodo
tags:
  - smoke
env:
  MAESTRO_USER_ID: maestro-e2e
  MAESTRO_USER_NAME: Maestro E2E
---
- launchApp:
    clearState: true

# --- login screen renders (dark theme redesign keeps this screen) ---
# first screen after a cold start: the initial JS bundle load can take
# minutes on CI, so the first wait is generous (later ones stay tight)
- extendedWaitUntil:
    visible:
      id: login-id-input
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: login-name-input
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: login-submit
    timeout: 10000

# --- validation: empty id must not navigate away ---
- tapOn:
    id: login-submit
# the app shows a native Alert for empty id; dismiss it before continuing
- tapOn: OK
- extendedWaitUntil:
    visible:
      id: login-id-input
    timeout: 10000

# --- successful login lands on the Chats tab with the tab bar ---
- tapOn:
    id: login-id-input
- inputText: ${MAESTRO_USER_ID}
- tapOn:
    id: login-name-input
- inputText: ${MAESTRO_USER_NAME}
# iOS 26 simulators don't expose the keyboard to XCUITest (hideKeyboard fails);
# single-line inputs blur on submit (Enter) instead
- pressKey: enter
- tapOn:
    id: login-submit
- extendedWaitUntil:
    visible:
      id: tab-chats
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: chats-title
    timeout: 10000
- assertVisible: OPC IM
- takeScreenshot: 01-chats-after-login
