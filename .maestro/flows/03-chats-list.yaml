# F3 — Chats list: navbar, search, conversation rows with preview/tags/badges.
appId: com.logact.utralTodo
tags:
  - smoke
---
- launchApp
- runFlow: ../subflows/login.yaml
- runFlow: ../subflows/seed.yaml
- tapOn:
    id: tab-chats

# --- navbar: title + new-group action ---
- assertVisible:
    id: chats-title
- assertVisible: OPC IM
- assertVisible:
    id: chats-new-group-btn

# --- search bar placeholder per prototype ---
- assertVisible:
    id: chats-search
- assertVisible: Search chats / agents

# --- conversation list renders ---
- assertVisible:
    id: conv-list
    timeout: 10000

# --- a conversation row exposes the style contract elements ---
# (list may be empty on a fresh server; only assert row internals when a row exists)
- runFlow:
    when:
      visible:
        id: conv-list
    commands:
      - takeScreenshot: 03-chats-list
