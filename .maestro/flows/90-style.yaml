    timeout: 10000
- extendedWaitUntil:
    visible:
      id: tab-contacts
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: tab-addagent
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: tab-me
    timeout: 10000
- takeScreenshot: style-01-chats

