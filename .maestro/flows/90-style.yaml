# Style suite — structural style assertions + screenshot capture for every screen.
# Maestro cannot read computed colors; this flow pins the *presence* of every
# style-bearing element (testID contract, README §3) and captures the screenshots
# used for visual review against the prototype (README §2).
appId: com.logact.utralTodo
tags:
  - style
---
- launchApp:
    clearState: true

# ============ S0 Login ============
- extendedWaitUntil:
    visible:
      id: login-id-input
    timeout: 10000
- takeScreenshot: style-00-login
- runFlow: ../subflows/login.yaml
- runFlow: ../subflows/seed.yaml

