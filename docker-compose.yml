services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opc
      POSTGRES_PASSWORD: opc
      POSTGRES_DB: opc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    build: ./docker/mosquitto
    ports:
      - "1883:1883"
      # mobile app 的 MQTT-over-WebSocket 入口
      - "9001:9001"
    # broker 需回调宿主机上的 server（host.docker.internal:3000）
    # macOS/Windows Docker Desktop 原生支持；host-gateway 兼容 Linux 与 CI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mosquitto_data:/mosquitto/data

volumes:
  postgres_data:
  mosquitto_data:
