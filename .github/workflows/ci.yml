name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  vars:
    name: Compute Variables
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.var.outputs.node-version }}
      pnpm-version: ${{ steps.var.outputs.pnpm-version }}
      version: ${{ steps.var.outputs.version }}
      source-hash: ${{ steps.source.outputs.hash }}
      docker-tag: ${{ steps.docker.outputs.tag }}
      lowercase-repo: ${{ steps.var.outputs.lowercase-repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - id: source
        run: |
          tar -cf /tmp/source.tar \
            --sort=name --owner=0 --group=0 --mtime='1970-01-01' \
            --exclude='.git' --exclude='.github' \
            --exclude='**/dist' --exclude='**/*.tsbuildinfo' \
            .
          HASH=$(sha256sum /tmp/source.tar | awk '{print $1}')
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

      - id: var
        run: |
          NODE=$(node -p "require('./package.json').engines.node.match(/\\d+/)[0]")
          PNPM=$(node -p "require('./package.json').packageManager.match(/pnpm@(.+)/)[1]")
          VERSION=$(node -p "require('./apps/server/package.json').version")
          REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "node-version=${NODE}" >> "$GITHUB_OUTPUT"
          echo "pnpm-version=${PNPM}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "lowercase-repo=${REPO}" >> "$GITHUB_OUTPUT"

      - id: docker
        run: |
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            TAG="pr-${{ github.event.number }}"
          else
            TAG="${GITHUB_REF_NAME//\//-}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Monorepo
    needs: vars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ needs.vars.outputs.node-version }}
          pnpm-version: ${{ needs.vars.outputs.pnpm-version }}

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: build-dist
          path: |
            apps/*/dist/
            packages/*/dist/
            apps/*/package.json
            packages/*/package.json
            package.json
            pnpm-workspace.yaml
            pnpm-lock.yaml
          retention-days: 1
          include-hidden-files: true

  checks:
    name: Code Checks
    needs: [vars, build]
    uses: ./.github/workflows/ci-checks.yml
    with:
      node-version: ${{ needs.vars.outputs.node-version }}
      pnpm-version: ${{ needs.vars.outputs.pnpm-version }}

  test:
    name: Tests
    needs: [vars, build]
    uses: ./.github/workflows/ci-test.yml
    with:
      node-version: ${{ needs.vars.outputs.node-version }}
      pnpm-version: ${{ needs.vars.outputs.pnpm-version }}
      # main 分支 push / tag push 上测试失败自动重试 2 次，PR 上不重试
      retries: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 2 || 0 }}

  docker:
    name: Docker Build & Push
    needs: [vars, build, checks, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: build-dist
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.vars.outputs.lowercase-repo }}/opc-server:${{ needs.vars.outputs.docker-tag }}
            ghcr.io/${{ needs.vars.outputs.lowercase-repo }}/opc-server:sha-${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/opc-server:main', needs.vars.outputs.lowercase-repo) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/opc-server:{1}', needs.vars.outputs.lowercase-repo, needs.vars.outputs.version) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/opc-server:latest', needs.vars.outputs.lowercase-repo) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ needs.vars.outputs.node-version }}

  done:
    name: CI Done
    needs: [checks, test, docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          check_result() {
            local name="$1" result="$2"
            if [[ "$name" == "docker" && "$result" == "skipped" ]]; then
              return
            fi
            if [[ "$result" != "success" ]]; then
              echo "$name failed: $result"
              exit 1
            fi
          }
          check_result checks '${{ needs.checks.result }}'
          check_result test '${{ needs.test.result }}'
          check_result docker '${{ needs.docker.result }}'
          echo "All required jobs passed"
