name: CI

on:
  pull_request:
    branches: ['**']
    paths-ignore: ['**.md']
  push:
    branches: [main]
    paths-ignore: ['**.md']
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  vars:
    name: Compute Variables
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.var.outputs.node-version }}
      pnpm-version: ${{ steps.var.outputs.pnpm-version }}
      source-hash: ${{ steps.source.outputs.hash }}
      docker-tag: ${{ steps.docker.outputs.tag }}
      lowercase-repo: ${{ steps.var.outputs.lowercase-repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - id: source
        run: |
          tar -cf /tmp/source.tar \
            --sort=name --owner=0 --group=0 --mtime='1970-01-01' \
            --exclude='.git' --exclude='.github' \
            --exclude='**/dist' --exclude='**/*.tsbuildinfo' \
            .
          HASH=$(sha256sum /tmp/source.tar | awk '{print $1}')
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

      - id: var
        run: |
          NODE=$(node -p "require('./package.json').engines.node.match(/\\d+/)[0]")
          PNPM=$(node -p "require('./package.json').packageManager.match(/pnpm@(.+)/)[1]")
          REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "node-version=${NODE}" >> "$GITHUB_OUTPUT"
          echo "pnpm-version=${PNPM}" >> "$GITHUB_OUTPUT"
          echo "lowercase-repo=${REPO}" >> "$GITHUB_OUTPUT"

      - id: docker
        run: |
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            TAG="pr-${{ github.event.number }}"
          else
            TAG="${GITHUB_REF_NAME//\//-}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Monorepo
    needs: vars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ needs.vars.outputs.node-version }}
          pnpm-version: ${{ needs.vars.outputs.pnpm-version }}

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@65c4c20a3fb8663eec9233a1b5805889ff91d21b # v4.6.0
        with:
          name: build-dist
          path: |
            apps/*/dist/
            packages/*/dist/
            apps/*/package.json
            packages/*/package.json
            package.json
            pnpm-workspace.yaml
            pnpm-lock.yaml
          retention-days: 1
          include-hidden-files: true

  checks:
    name: Code Checks
    needs: [vars, build]
    uses: ./.github/workflows/ci-checks.yml
    with:
      node-version: ${{ needs.vars.outputs.node-version }}
      pnpm-version: ${{ needs.vars.outputs.pnpm-version }}

  test:
    name: Tests
    needs: [vars, build]
    uses: ./.github/workflows/ci-test.yml
    with:
      node-version: ${{ needs.vars.outputs.node-version }}
      pnpm-version: ${{ needs.vars.outputs.pnpm-version }}

  docker:
    name: Docker Build & Push
    needs: [vars, build, checks, test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da83d56bef7bb2 # v4.2.1
        with:
          name: build-dist
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2320d5ddb47abd05b7c0 # v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81941eba4e484cd11ab18d # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5aee3c671ebfdb8ef84113d34d0c # v6.15.0
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.vars.outputs.lowercase-repo }}/opc-server:${{ needs.vars.outputs.docker-tag }}
            ghcr.io/${{ needs.vars.outputs.lowercase-repo }}/opc-server:sha-${{ github.sha }}
            ${{ github.event_name == 'release' && format('ghcr.io/{0}/opc-server:latest', needs.vars.outputs.lowercase-repo) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ needs.vars.outputs.node-version }}

  done:
    name: CI Done
    needs: [checks, test, docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          for job in checks test docker; do
            result='${{ needs[job].result }}'
            if [[ "$job" == "docker" && "$result" == "skipped" ]]; then
              continue
            fi
            if [[ "$result" != "success" ]]; then
              echo "$job failed: $result"
              exit 1
            fi
          done
          echo "All required jobs passed"
