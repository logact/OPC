name: Tag Release on Merge

# 当 Release PR（分支名以 release/v 开头）合并到 main 后：
# 1. 读取 package.json 版本
# 2. 打 tag vX.Y.Z 并推送
# 3. 创建 GitHub Release
# 4. tag push 自动触发 CI 构建 Docker 镜像，并触发 development 自动部署
on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  # 必须使用 PAT 推送 tag，否则 GITHUB_TOKEN 触发的事件不会启动下游 CI workflow
  GH_TOKEN: ${{ secrets.RELEASE_PAT }}

jobs:
  tag-and-release:
    name: Tag and Create Release
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Configure npm registry
        run: |
          npm config set @opc:registry https://registry.npmjs.org
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Build shared packages
        run: |
          pnpm -F '@logact-pub/opc-protocol' build
          pnpm -F '@logact-pub/opc-sdk' build

      - name: Publish packages to npm
        run: |
          pnpm -F '@logact-pub/opc-protocol' publish --no-git-checks --access public
          pnpm -F '@logact-pub/opc-sdk' publish --no-git-checks --access public

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        run: gh release create "v${VERSION}" --generate-notes --latest --target main
