name: Release Guard

# 阻止未 finalize 的 RC 版本被合并到 master。
# next/cut 产生的 release PR 在 finalize 之前版本号含 -rc，
# 这个检查会强制让对应 PR 的 CI 失败，从而被分支保护规则挡住。
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

permissions:
  contents: read

jobs:
  guard:
    name: No RC on master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure version is not a prerelease
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::apps/server is still a prerelease version (${VERSION}). Run 'finalize' on the release branch before merging into master."
            exit 1
          fi
          echo "Version ${VERSION} is ready for master."
