name: Start New Release

# changesets 驱动的发版（参照 Rocket.Chat）：
# - next:     从 develop 切 release 分支，消费累积的 changesets 算出 X.Y.Z-rc.0
# - cut:      在 release 分支上递增 RC（-rc.N+1），需先合入带 changeset 的修复
# - finalize: 在 release 分支上退出 RC，得到正式版 X.Y.Z，随后合并 PR 到 master
# - patch:    从 master 切 release 分支，直接 patch+1（无 RC）
# 版本载体：apps/server/package.json（根 package.json 同步）。
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Release action'
        required: true
        type: choice
        default: next
        options:
          - next
          - cut
          - finalize
          - patch
      base-ref:
        description: 'develop (next) / master 或 vX.Y.Z tag (patch) / release-X.Y.Z (cut, finalize)'
        required: true
        type: string
        default: develop

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.base-ref }}
          fetch-depth: 0

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate base ref
        run: |
          case '${{ inputs.name }}' in
            next)  [[ '${{ inputs.base-ref }}' == 'develop' ]] || { echo "next must start from develop" >&2; exit 1; } ;;
            patch)
              if [[ '${{ inputs.base-ref }}' != 'master' && ! '${{ inputs.base-ref }}' =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "patch must start from master or a vX.Y.Z tag" >&2; exit 1
              fi
              if [[ '${{ inputs.base-ref }}' == v* ]] && ! git ls-remote --tags origin "refs/tags/${{ inputs.base-ref }}" | grep -q .; then
                echo "tag ${{ inputs.base-ref }} does not exist on origin" >&2; exit 1
              fi
              ;;
            cut|finalize) [[ '${{ inputs.base-ref }}' == release-* ]] || { echo "cut/finalize must run on a release-* branch" >&2; exit 1; } ;;
          esac

      # ── next: develop → release-X.Y.Z with X.Y.Z-rc.0 ────────────────
      - name: next — enter RC mode and compute version from changesets
        if: inputs.name == 'next'
        run: |
          pnpm changeset pre enter rc
          pnpm changeset version
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if ! [[ "$VERSION" =~ -rc\.0$ ]]; then
            echo "Expected initial RC version X.Y.Z-rc.0, got '${VERSION}'. No changesets accumulated on develop?" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: next — create release branch, tag and PR
        if: inputs.name == 'next'
        run: |
          FINAL=${VERSION%%-*}
          BRANCH="release-${FINAL}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: release ${VERSION}"
          git push origin "$BRANCH"
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --prerelease --generate-notes --target "$BRANCH"
          gh pr create --base master --head "$BRANCH" \
            --title "Release ${FINAL}" \
            --body "Release candidate ${VERSION}. Run **finalize** (Start New Release) before merging."

      # ── cut: bump RC on the release branch ───────────────────────────
      - name: cut — ensure there is something to bump
        if: inputs.name == 'cut'
        run: |
          if ! ls .changeset/*.md 2>/dev/null | grep -qv README; then
            TS=$(date +%s)
            printf -- '---\n"@opc/server": patch\n---\n\nRelease candidate bump\n' > ".changeset/bump-rc-${TS}.md"
          fi

      - name: cut — increment RC version
        if: inputs.name == 'cut'
        run: |
          pnpm changeset version
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if ! [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            echo "Not in RC mode (got '${VERSION}'); use finalize instead" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: cut — commit, tag and prerelease
        if: inputs.name == 'cut'
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          git add -A
          git commit -m "chore: release ${VERSION}"
          git push origin "HEAD:${{ inputs.base-ref }}"
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --prerelease --generate-notes --target "${{ inputs.base-ref }}"

      # ── finalize: exit RC on the release branch ──────────────────────
      - name: finalize — exit RC mode
        if: inputs.name == 'finalize'
        run: |
          pnpm changeset pre exit
          pnpm changeset version
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Still a prerelease after pre exit: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: finalize — commit and push
        if: inputs.name == 'finalize'
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          git add -A
          git commit -m "chore: finalize release ${VERSION}"
          git push origin "HEAD:${{ inputs.base-ref }}"
          echo "Release ${VERSION} finalized — merge the release PR into master to publish."

      # ── patch: master → release-X.Y.(Z+1), no RC ─────────────────────
      - name: patch — bump patch version
        if: inputs.name == 'patch'
        run: |
          TS=$(date +%s)
          printf -- '---\n"@opc/server": patch\n---\n\nPatch release\n' > ".changeset/bump-patch-${TS}.md"
          pnpm changeset version
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Unexpected prerelease version: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: patch — create release branch
        if: inputs.name == 'patch'
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          BRANCH="release-${VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: release ${VERSION}"
          git push origin "$BRANCH"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

      - name: patch — current version: open PR to master
        if: inputs.name == 'patch' && inputs.base-ref == 'master'
        run: |
          gh pr create --base master --head "${BRANCH}" \
            --title "Release ${VERSION}" \
            --body "Patch release ${VERSION}."

      - name: patch — old version: tag and release from branch (no master merge)
        if: inputs.name == 'patch' && inputs.base-ref != 'master'
        run: |
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "v${VERSION}"
          gh api -X POST "repos/${{ github.repository }}/releases" \
            -f tag_name="v${VERSION}" -f target_commitish="${BRANCH}" \
            -f generate_release_notes=true -f make_latest=false \
            --jq '.html_url'
          echo "Old-version patch ${VERSION} released from ${BRANCH} (based on ${{ inputs.base-ref }})."
          echo "Remember to cherry-pick the fix into develop (and any active release branch)."
