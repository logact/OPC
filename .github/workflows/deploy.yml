name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. master, develop, sha-xxx, 1.0.1)'
        required: true
        default: 'master'
        type: string
      ref:
        description: 'Git ref to checkout for deployment files (e.g. master, develop, release-x.y.z)'
        required: true
        default: 'master'
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to self-hosted server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Compute image tag
        id: image
        run: |
          REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "server-image=ghcr.io/${REPO}/opc-server:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy
            HostName ${{ vars.SERVER_HOST }}
            User ${{ vars.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Sync deployment files
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          ssh deploy "mkdir -p ${DEPLOY_DIR}/docker/mosquitto"
          scp docker-compose.prod.yml deploy:"${DEPLOY_DIR}/"
          scp docker/mosquitto/Dockerfile deploy:"${DEPLOY_DIR}/docker/mosquitto/"
          scp docker/mosquitto/mosquitto.prod.conf deploy:"${DEPLOY_DIR}/docker/mosquitto/"
          scp docker/mosquitto/mosquitto.conf deploy:"${DEPLOY_DIR}/docker/mosquitto/"

      - name: Generate .env on server
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          DATABASE_URL_LINE=""
          if [ -n "${{ vars.DATABASE_URL }}" ]; then
            DATABASE_URL_LINE="DATABASE_URL=${{ vars.DATABASE_URL }}"
          fi
          ssh deploy "cat > \"${DEPLOY_DIR}/.env\" <<'ENV_EOF'
          PORT=${{ vars.PORT || '3000' }}
          POSTGRES_USER=${{ vars.POSTGRES_USER || 'opc' }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB || 'opc' }}
          ${DATABASE_URL_LINE}
          MQTT_BROKER_URL=${{ vars.MQTT_BROKER_URL || 'mqtt://mosquitto:1883' }}
          MQTT_SERVER_USERNAME=${{ vars.MQTT_SERVER_USERNAME || '__server__' }}
          MQTT_SERVER_PASSWORD=${{ secrets.MQTT_SERVER_PASSWORD }}
          MQTT_PORT=${{ vars.MQTT_PORT || '1883' }}
          SERVER_IMAGE=${{ steps.image.outputs.server-image }}
          ENV_EOF"
          ssh deploy "chmod 600 \"${DEPLOY_DIR}/.env\""

      - name: Deploy
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          ssh deploy <<EOF
            set -e
            cd "${DEPLOY_DIR}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d postgres
            docker compose -f docker-compose.prod.yml run --rm migrations
            docker compose -f docker-compose.prod.yml up -d --build mosquitto server
            docker compose -f docker-compose.prod.yml ps
            docker system prune -f
          EOF

      - name: Health check
        run: |
          echo "Waiting for server healthcheck..."
          ssh deploy "cd ${{ vars.SERVER_DIR }} && docker compose -f docker-compose.prod.yml ps"
