name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production
      image_tag:
        description: 'Docker image tag to deploy (e.g. latest, main, sha-xxx, 1.0.1)'
        required: true
        default: 'latest'
        type: string
      ref:
        description: 'Git ref to checkout for deployment files (e.g. main, release-x.y.z)'
        required: true
        default: 'main'
        type: string
      reset_postgres:
        description: 'Reset PostgreSQL data volume (will delete existing postgres data)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute image tag
        id: image
        run: |
          REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "server-image=ghcr.io/${REPO}/opc-server:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy
            HostName ${{ vars.SERVER_HOST }}
            Port ${{ vars.SERVER_SSH_PORT || '22' }}
            User ${{ vars.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Sync deployment files
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          ssh deploy "mkdir -p ${DEPLOY_DIR}/docker/mosquitto"
          scp docker-compose.prod.yml deploy:"${DEPLOY_DIR}/"
          scp docker/mosquitto/Dockerfile deploy:"${DEPLOY_DIR}/docker/mosquitto/"
          scp docker/mosquitto/mosquitto.prod.conf deploy:"${DEPLOY_DIR}/docker/mosquitto/"
          scp docker/mosquitto/mosquitto.conf deploy:"${DEPLOY_DIR}/docker/mosquitto/"

      - name: Generate .env on server
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          DATABASE_URL_LINE=""
          if [ -n "${{ vars.DATABASE_URL }}" ]; then
            DATABASE_URL_LINE="DATABASE_URL=${{ vars.DATABASE_URL }}"
          fi
          ssh deploy "cat > \"${DEPLOY_DIR}/.env\" <<'ENV_EOF'
          PORT=${{ vars.PORT || '3000' }}
          POSTGRES_USER=${{ vars.POSTGRES_USER || 'opc' }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB || 'opc' }}
          ${DATABASE_URL_LINE}
          MQTT_BROKER_URL=${{ vars.MQTT_BROKER_URL || 'mqtt://mosquitto:1883' }}
          MQTT_SERVER_USERNAME=${{ vars.MQTT_SERVER_USERNAME || '__server__' }}
          MQTT_SERVER_PASSWORD=${{ secrets.MQTT_SERVER_PASSWORD }}
          MQTT_PORT=${{ vars.MQTT_PORT || '1883' }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SERVER_IMAGE=${{ steps.image.outputs.server-image }}
          MOSQUITTO_IMAGE=${{ vars.MOSQUITTO_IMAGE || 'ghcr.io/logact/opc-mosquitto:latest' }}
          ENV_EOF"
          ssh deploy "chmod 600 \"${DEPLOY_DIR}/.env\""

      - name: Reset PostgreSQL data (optional)
        if: ${{ github.event.inputs.reset_postgres == 'true' }}
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          ssh deploy <<EOF
            set -e
            cd "${DEPLOY_DIR}"
            docker compose -f docker-compose.prod.yml down || true
            docker volume ls -q -f name=postgres_data | xargs -r docker volume rm 2>/dev/null || true
          EOF

      - name: Deploy
        run: |
          DEPLOY_DIR="${{ vars.SERVER_DIR }}"
          ssh deploy <<EOF
            set -e
            cd "${DEPLOY_DIR}"
            docker compose -f docker-compose.prod.yml down || true
            # Stop and remove legacy opc-server stack containers
            docker ps -aq --filter "name=opc-server-" | xargs -r docker rm -f || true
            # Force-remove any container still holding deployment ports from previous stacks
            for port in 3000 1883; do
              docker ps -a --format "{{.ID}}\t{{.Ports}}" | grep ":${port}->" | awk '{print $1}' | xargs -r docker rm -f || true
            done
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d postgres
            docker compose -f docker-compose.prod.yml run --rm migrations < /dev/null
            docker compose -f docker-compose.prod.yml up -d mosquitto server
            docker compose -f docker-compose.prod.yml ps
            docker system prune -f
          EOF

      - name: Health check
        run: |
          echo "Waiting for server healthcheck..."
          ssh deploy <<EOF
            cd "${{ vars.SERVER_DIR }}"
            docker compose -f docker-compose.prod.yml ps
            echo "Checking server health endpoint..."
            for i in {1..30}; do
              if docker compose -f docker-compose.prod.yml exec -T server node -e "fetch('http://localhost:3000/openapi.json').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" < /dev/null; then
                echo "Server is healthy"
                exit 0
              fi
              echo "Health check retry \${i}/30..."
              sleep 2
            done
            echo "Server health check failed"
            echo "--- server logs ---"
            docker compose -f docker-compose.prod.yml logs server --tail=50
            echo "--- mosquitto logs ---"
            docker compose -f docker-compose.prod.yml logs mosquitto --tail=50
            exit 1
          EOF
