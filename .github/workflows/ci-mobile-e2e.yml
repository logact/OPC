name: Mobile E2E (Maestro)

# 在 iOS simulator 上跑 .maestro/ 测试套件：
# 1. 起 PostgreSQL + Mosquitto（brew，匿名 broker——UI e2e 不覆盖 MQTT 鉴权，
#    无需 docker/mosquitto 的 go-auth 插件；macOS runner 也不支持 docker）
# 2. xcodebuild 构建 Debug simulator app + Metro dev server
# 3. iOS simulator 与 host 共享网络，localhost:8081/3000/1883 直达，无需 adb reverse
# 4. maestro test .maestro/
# 由 ci.yml 通过 workflow_call 调用，仅在 mobile / .maestro / packages 变更时运行。
on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      pnpm-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  mobile-e2e:
    name: Maestro E2E (iOS simulator)
    runs-on: macos-15
    timeout-minutes: 90
    env:
      DATABASE_URL: postgres://opc:opc@localhost:5432/opc
      MQTT_BROKER_URL: mqtt://localhost:1883
      MQTT_SERVER_USERNAME: __server__
      MQTT_SERVER_PASSWORD: ci-superuser-secret
      OPC_SERVER_URL: http://localhost:3000
      # Required by apps/server/src/index.ts at startup (tests inject their own).
      JWT_SECRET: ci-e2e-secret-must-be-at-least-32-characters
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ inputs.node-version }}
          pnpm-version: ${{ inputs.pnpm-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Start PostgreSQL (brew)
        run: |
          brew install postgresql@16
          PG_BIN="$(brew --prefix postgresql@16)/bin"
          export PATH="$PG_BIN:$PATH"
          initdb -D /tmp/opc-pgdata -U opc --pwfile=<(echo -n opc) >/dev/null
          pg_ctl -D /tmp/opc-pgdata -l /tmp/pg.log -o "-p 5432 -k /tmp" start
          for i in $(seq 1 30); do
            if "$PG_BIN/pg_isready" -h localhost -p 5432 -U opc -q; then echo "postgres ready"; exit 0; fi
            sleep 1
          done
          echo "postgres failed to start"; cat /tmp/pg.log; exit 1

      - name: Start Mosquitto (brew, anonymous)
        run: |
          brew install mosquitto
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > /tmp/mosquitto-e2e.conf
          nohup "$(brew --prefix mosquitto)/sbin/mosquitto" -c /tmp/mosquitto-e2e.conf > mosquitto.log 2>&1 &
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/1883) 2>/dev/null; then exec 3>&-; echo "mosquitto ready"; exit 0; fi
            sleep 1
          done
          echo "mosquitto failed to start"; cat mosquitto.log; exit 1

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Start OPC server
        run: |
          nohup pnpm --filter @opc/server start > server.log 2>&1 &
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/localhost/3000) 2>/dev/null; then exec 3>&-; echo "server ready"; exit 0; fi
            sleep 1
          done
          echo "server failed to start"; cat server.log; exit 1

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Build iOS app (Debug, simulator)
        run: |
          xcodebuild \
            -workspace apps/mobile/ios/OPC.xcworkspace \
            -scheme OPC \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios-build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Start Metro bundler
        run: |
          CI=1 nohup pnpm --filter @opc/mobile exec expo start --port 8081 > metro.log 2>&1 &
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/localhost/8081) 2>/dev/null; then exec 3>&-; echo "metro ready"; exit 0; fi
            sleep 1
          done
          echo "metro failed to start"; cat metro.log; exit 1

      # 预热 iOS bundle：首次冷打包在 CI 上可能需要数分钟，若不预热，
      # simulator 里首次启动会卡在 JS 加载上，超出 Maestro 的查找超时。
      # 注意：monorepo 下 Expo dev server 的 bundle 路径带包目录前缀
      # （/apps/mobile/index.bundle，见 / manifest 的 launchAsset.url）。
      - name: Warm up Metro bundle (cold bundling is slow on CI)
        run: |
          curl -fsS --max-time 600 \
            "http://localhost:8081/apps/mobile/index.bundle?platform=ios&dev=true&minify=false" \
            -o /dev/null
          echo "bundle warmed"

      - name: Boot iOS simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes available -j | jq -r '[.runtimes[] | select(.platform == "iOS")] | last | .identifier')
          UDID=$(xcrun simctl create opc-e2e com.apple.CoreSimulator.SimDeviceType.iPhone-16 "$RUNTIME")
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      # simulation：无真实 agent，永远跑不了；agent-backend：等 protocol/server 支持（见 .maestro/README §6）
      - name: Run Maestro suite on iOS simulator
        run: |
          xcrun simctl install booted ios-build/Build/Products/Debug-iphonesimulator/OPC.app
          maestro test .maestro/ --exclude-tags simulation,agent-backend --format junit --output maestro-results/results.xml

      - name: Upload Maestro report & screenshots
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: maestro-results
          path: |
            maestro-results/
            ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7

      - name: Print server & metro logs on failure
        if: failure()
        run: |
          tail -200 server.log || true
          tail -200 metro.log || true
          cat mosquitto.log || true
