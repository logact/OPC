name: Release

# PR 式发布流程：
# 1. 手动触发 workflow
# 2. 在 main 上执行 pnpm changeset version，消费累积的 changesets
# 3. 创建 release 分支并推送
# 4. 创建 Release PR，等待人工审核合并
# 5. PR 合并到 main 后，由 tag-release.yml 自动打 tag、创建 GitHub Release
# 6. tag push 自动触发 CI，构建并推送 Docker 镜像（version + latest）
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute version from changesets
        id: version
        run: |
          pnpm changeset version
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Unexpected prerelease version: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync root package.json version
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Create release branch
        run: |
          RELEASE_BRANCH="release/v${VERSION}"
          git checkout -b "${RELEASE_BRANCH}"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 1
          fi
          git commit -m "chore: release ${VERSION}"
          git push origin "${RELEASE_BRANCH}"
          echo "RELEASE_BRANCH=${RELEASE_BRANCH}" >> "$GITHUB_ENV"

      - name: Create Release PR
        run: |
          gh pr create \
            --base main \
            --head "${RELEASE_BRANCH}" \
            --title "chore(release): v${VERSION}" \
            --body "This PR was auto-generated by the release workflow. Merge to publish v${VERSION}."
