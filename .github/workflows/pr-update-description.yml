name: Release PR Description

# 当 release-* 分支向 master 发起 PR 时，自动把 changelog 预览写入 PR 描述。
on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr:
    name: Update PR description
    if: startsWith(github.head_ref, 'release-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate changelog preview and update PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch origin master --quiet
          CHANGELOG=$(git log --pretty='- %s (%h)' FETCH_HEAD..HEAD)
          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="_No commits ahead of master._"
          fi
          BODY=$(cat <<EOF
          ## Changelog preview

          ${CHANGELOG}

          ---
          _Auto-generated by pr-update-description.yml on each push to the release branch._
          EOF
          )
          gh pr edit "$PR_NUMBER" --body "$BODY"
