name: Tests

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      pnpm-version:
        required: true
        type: string
      retries:
        required: false
        type: number
        default: 0
        description: vitest retry count for flaky tests on important branches

permissions:
  contents: read

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opc
          POSTGRES_PASSWORD: opc
          POSTGRES_DB: opc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://opc:opc@localhost:5432/opc
      MQTT_BROKER_URL: mqtt://localhost:1883
      MQTT_SERVER_USERNAME: __server__
      MQTT_SERVER_PASSWORD: ci-superuser-secret
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ inputs.node-version }}
          pnpm-version: ${{ inputs.pnpm-version }}

      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: build-dist
          path: .

      - name: Start mosquitto broker
        run: |
          docker build -t opc-mosquitto docker/mosquitto
          docker run -d --name mosquitto \
            --add-host=host.docker.internal:host-gateway \
            -p 1883:1883 opc-mosquitto
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/1883) 2>/dev/null; then exec 3>&-; echo "mosquitto ready"; exit 0; fi
            sleep 1
          done
          echo "mosquitto failed to start"; docker logs mosquitto; exit 1

      - name: Run unit tests
        run: pnpm test -- --retry=${{ inputs.retries }}

      - name: Run e2e tests
        run: pnpm test:e2e -- --retry=${{ inputs.retries }}
