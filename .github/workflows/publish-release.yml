name: Publish Release

# release PR（finalize 后为正式版本号）合并进 master 时触发：
# 1. 校验版本号不是 RC（防止未 finalize 的合并）
# 2. 打 vX.Y.Z tag 并创建正式 GitHub Release（tag 已存在则跳过，可重入）
# 3. 把 master 回合并到 develop，同步版本号与 CHANGELOG
# Docker 镜像的版本 tag 与 latest 由 ci.yml 的 docker job 在 master push 时推送。
on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Refusing to publish prerelease version '${VERSION}'. Run 'finalize' on the release branch before merging." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --latest --target "${{ github.sha }}"

      - name: Back-merge master into develop
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout -B develop origin/develop
          git merge --no-edit "${{ github.sha }}"
          git push origin develop
