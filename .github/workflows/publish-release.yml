name: Publish Release

# master push 时自动发布：
# - 如果当前是 RC（含 -rc），先执行 changeset pre exit + version 转成正式版，
#   提交并 push 到 master，然后结束；由新的 master push 触发下一轮创建 release。
# - 如果当前是正式版，直接打 tag 并创建 GitHub Release。
# 不 back-merge 到 develop（与 Rocket.Chat 保持一致）。
on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Finalize RC on master
        id: finalize
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" != *-* ]]; then
            echo "Already a final version: ${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "finalized=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Finalizing RC version ${VERSION} on master"
          pnpm changeset pre exit
          pnpm changeset version

          VERSION=$(node -p "require('./apps/server/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Still a prerelease after finalize: ${VERSION}" >&2
            exit 1
          fi

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

          git add -A
          git commit -m "chore: finalize release ${VERSION}"
          git push origin HEAD:master

          echo "RC finalized to ${VERSION}; the next master push will create the release."
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "finalized=false" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        if: steps.finalize.outputs.finalized == 'true'
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.finalize.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.finalize.outputs.finalized == 'true' && steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.finalize.outputs.version }}"
          gh release create "v${VERSION}" --generate-notes --latest --target "${{ github.sha }}"
