name: Setup pnpm + Node
description: Installs pnpm, sets up Node, caches node_modules, and installs dependencies.

inputs:
  node-version:
    required: true
    description: Node.js major version (e.g. 20)
  pnpm-version:
    required: true
    description: pnpm version (e.g. 9.15.0)

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
