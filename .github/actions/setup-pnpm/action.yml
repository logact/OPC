name: Setup pnpm + Node
description: Installs pnpm, sets up Node, caches dependencies, and installs them.

inputs:
  node-version:
    required: true
    description: Node.js major version (e.g. 22)
  pnpm-version:
    required: true
    description: pnpm version (e.g. 9.15.0)
  cache-dependency-path:
    required: false
    description: Path to the pnpm-lock.yaml used for the actions/setup-node cache.
    default: pnpm-lock.yaml
  run-install:
    required: false
    description: Whether to run pnpm install --frozen-lockfile after setting up Node.
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      if: inputs.run-install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
