listener 1883
allow_anonymous false

# WebSocket listener：mobile（React Native）的 mqtt.js 只有 WS 传输，
# app 通过 wss://<host>:9001 接入（TLS 由前置反代/Ingress 终结）。
listener 9001
protocol websockets
allow_anonymous false

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# 生产环境：server 与 mosquitto 在同一 Docker 网络内，通过服务名 `server` 访问
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_cache false
auth_opt_http_host server
auth_opt_http_port 3000
auth_opt_http_getuser_uri /api/v1/auth/mqtt/user
auth_opt_http_superuser_uri /api/v1/auth/mqtt/superuser
auth_opt_http_aclcheck_uri /api/v1/auth/mqtt/acl
auth_opt_http_method POST
auth_opt_http_params_mode json
auth_opt_http_response_mode status
